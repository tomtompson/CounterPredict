services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:${FLARESOLVERR_IMAGE_VERSION:-latest}
    ports:
      - "${FLARESOLVERR_PORT:-8191}:${FLARESOLVERR_PORT:-8191}"
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL:-info}
      - CAPTCHA_SOLVING=${FLARESOLVERR_CAPTCHA_SOLVING:-false}
      - HEADLESS=true
      - BROWSER_TIMEOUT=${FLARESOLVERR_BROWSER_TIMEOUT:-60000}
    networks:
      - internal
    restart: unless-stopped

  hltv-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    environment:
      - API_PORT=${API_PORT:-8000}
      - FLARESOLVERR_HOST=flaresolverr
      - FLARESOLVERR_PORT=${FLARESOLVERR_PORT:-8191}
      - RATE_LIMITING_ENABLE=${RATE_LIMITING_ENABLE:-false}
      - RATE_LIMITING_FREQUENCY=${RATE_LIMITING_FREQUENCY:-2/3seconds}
    depends_on:
      - flaresolverr
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
